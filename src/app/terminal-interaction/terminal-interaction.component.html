<div class="terminal-interaction-page">
  <!-- Header Section -->
  <div class="page-header">
    <h2>Terminal Interaction</h2>
    <p-button label="Back"
              icon="pi pi-arrow-left"
              severity="secondary"
              (onClick)="goBack()"></p-button>
  </div>

  <div class="splitter-wrapper">
    <p-splitter [style]="{'height': '100%'}" [panelSizes]="[75, 25]">

    <!-- 左侧：终端区域 -->
    <ng-template pTemplate>
      <div class="terminal-panel">
        <!-- 连接状态指示器 -->
        <div class="status-indicator" [ngClass]="connectionStatus.connected ? 'connected' : 'disconnected'">
          <i class="pi" [ngClass]="connectionStatus.connected ? 'pi-check-circle' : 'pi-times-circle'"></i>
          <span>{{ connectionStatus.connected ? 'Connected' : 'Disconnected' }}</span>
        </div>

        <!-- xterm.js 容器 -->
        <div #terminalContainer class="terminal-container">
          <div class="terminal-fullscreen-toggle" (click)="toggleFullscreen()">
            <i class="pi pi-expand" [ngClass]="{'pi-compress': isFullscreen}"></i>
          </div>
        </div>
      </div>
    </ng-template>

    <!-- 右侧：信息与操作区 -->
    <ng-template pTemplate>
      <div class="info-panel">
        <!-- 目标机信息卡片 -->
        <p-card class="target-info-card">
          <div class="info-item">
            <i class="pi pi-user"></i>
            <span>{{ targetInfo?.name }}</span>
          </div>
          <div class="info-item">
            <i class="pi pi-id-card"></i>
            <span>{{ targetInfo?.barcode }}</span>
          </div>
          <div class="info-item">
            <i class="pi pi-tag"></i>
            <span>{{ targetInfo?.target_type }}</span>
          </div>
          <div class="info-item">
            <i class="pi pi-server"></i>
            <span>{{ targetInfo?.os }}</span>
          </div>
          <div class="info-item">
            <i class="pi pi-desktop"></i>
            <span>{{ targetInfo?.platform }}</span>
          </div>
          <div class="info-item">
            <i class="pi pi-microchip"></i>
            <span>{{ targetInfo?.architecture }}</span>
          </div>
          <div class="info-item" *ngIf="targetInfo">
            <i class="pi pi-clock" [ngClass]="{'text-blue-500': targetInfo && 'reservedAt' in targetInfo}"></i>
            <span>{{ getFormattedReserveTime() }}</span>
          </div>
          <!-- <div class="info-item">
            <i class="pi pi-circle" [ngClass]="{'text-green-500': targetInfo?.status === 'available', 'text-red-500': targetInfo?.status === 'in_use'}"></i>
            <span>{{ targetInfo?.status }}</span>
          </div> -->
        </p-card>

        <!-- 操作按钮区 -->
        <div class="action-buttons">
          <p-button label="Reconnect"
                    icon="pi pi-refresh"
                    (onClick)="reconnect()"
                    [disabled]="connectionStatus.connected"></p-button>
          <p-button label="Disconnect"
                    icon="pi pi-times"
                    severity="danger"
                    (onClick)="disconnect()"
                    [disabled]="!connectionStatus.connected"></p-button>
        </div>
      </div>
    </ng-template>

  </p-splitter>
  </div>
</div>
