<div class="my-reservation-page">
  <!-- Header Section -->
  <div class="page-header">
    <h2>My Reservation</h2>
  </div>

  <!-- Data Table -->
  <p-table [value]="reservedTargets"
           styleClass="p-datatable-striped">

    <ng-template pTemplate="header">
      <tr>
        <th style="width: 18%">Name</th>
        <th style="width: 12%">Architecture</th>
        <th style="width: 12%">OS</th>
        <th style="width: 12%">Type</th>
        <th style="width: 15%">Reserved At</th>
        <th style="width: 13%">Reserved By</th>
        <th style="width: 18%">Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-row>
      <tr>
        <td>{{ row.name }}</td>
        <td>{{ row.architecture || '-' }}</td>
        <td>{{ row.os || '-' }}</td>
        <td>{{ row.target_type }}</td>
        <td>{{ row.reservedAt | date:'yyyy-MM-dd HH:mm:ss' }}</td>
        <td>{{ row.reservedBy }}</td>
        <td>
          <div class="action-buttons">
            <p-button label="Connect"
                      icon="pi pi-sign-in"
                      severity="primary"
                      size="small"
                      (onClick)="onConnect(row)"></p-button>
            <p-button label="Release"
                      icon="pi pi-times"
                      severity="danger"
                      size="small"
                      (onClick)="onRelease(row)"></p-button>
          </div>
        </td>
      </tr>
    </ng-template>

    <!-- Empty message -->
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="7" style="text-align: center; padding: 2rem;">
          You have no reserved targets.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
